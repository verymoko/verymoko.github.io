<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Расписание преподавателей</title>
  <style>
    :root {
      --bg: #f7f7fb;
      --card: #ffffff;
      --text: #1e1f24;
      --muted: #7a7f8d;
      --line: #e7e9ef;
      --line-strong: #d8dce6;
      --accent: #3a67ff;
      --teacher-col-w: 200px;
      --row-h: 72px;
      --header-h: 52px;
      --hour-w: 56px;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      background: var(--card);
      border-bottom: 1px solid var(--line);
    }

    .toolbar-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    #weekZoomBar {
      margin-left: auto;
    }

    .view-switch {
      display: inline-flex;
      background: #eef1f9;
      padding: 4px;
      border-radius: 10px;
      gap: 4px;
    }

    .view-switch button {
      border: 0;
      background: transparent;
      color: #5c6272;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
    }

    .view-switch button.active {
      background: #fff;
      color: var(--text);
      box-shadow: 0 1px 2px rgba(16, 24, 40, 0.1);
    }

    .date-nav {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .date-nav button {
      border: 1px solid var(--line-strong);
      border-radius: 9px;
      background: #fff;
      color: var(--text);
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
    }

    .date-nav button:hover {
      border-color: #c9d0e4;
    }

    /*
      Фиксированная зона под дату: хватает на диапазон вроде «30 сентября — 5 октября 2026»
      (длинные названия месяцев в родительном падеже), чтобы блок ←Сегодня→ не прыгал.
    */
    .date-title {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.25;
      flex: 0 0 36ch;
      width: 36ch;
      max-width: 100%;
      text-align: start;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .board-wrap {
      flex: 1;
      min-height: 0;
      width: 100%;
      overflow: auto;
      padding: 0 0 16px;
    }

    .board {
      --hours: 12;
      --day-span: 1;
      display: grid;
      grid-template-columns: var(--teacher-col-w) max-content;
      grid-template-rows: auto 1fr;
      width: max-content;
      min-width: 100%;
    }

    /* Режим «День»: временная шкала и дорожки на всю ширину окна */
    .board.day {
      width: 100%;
      max-width: 100%;
      grid-template-columns: var(--teacher-col-w) minmax(0, 1fr);
    }

    .board.day .timeline-day-mode {
      width: 100%;
      min-width: 0;
    }

    .board.day .hour-cell.hour-tick {
      flex: 1 1 0;
      min-width: 0;
      width: auto;
    }

    .board.day .track {
      width: 100%;
      min-width: 0;
      background-image: repeating-linear-gradient(
        to right,
        transparent 0,
        transparent calc(100% / var(--hours) - 1px),
        var(--line) calc(100% / var(--hours) - 1px),
        var(--line) calc(100% / var(--hours))
      );
    }

    /*
      Неделя «Вся сетка в экран»: вторая колонка тянется на всю ширину (без щели от floor(px)).
      Сетка часов и дней — в долях 100%, не фиксированный --hour-w.
    */
    .board.week.week-zoom-fit {
      width: 100%;
      max-width: 100%;
      grid-template-columns: var(--teacher-col-w) minmax(0, 1fr);
    }

    .board.week.week-zoom-fit .timeline-week-mode {
      width: 100%;
      min-width: 0;
    }

    .board.week.week-zoom-fit .week-day-names span {
      flex: 1 1 0;
      min-width: 0;
      width: auto;
    }

    .board.week.week-zoom-fit .tracks {
      width: 100%;
      min-width: 0;
    }

    .board.week.week-zoom-fit .track {
      width: 100%;
      min-width: 0;
      background-image:
        repeating-linear-gradient(
          to right,
          rgba(58, 103, 255, 0.04) 0,
          rgba(58, 103, 255, 0.04) calc(100% / var(--day-span) - 2px),
          transparent calc(100% / var(--day-span) - 2px),
          transparent calc(100% / var(--day-span))
        ),
        repeating-linear-gradient(
          to right,
          transparent 0,
          transparent calc(100% / (var(--hours) * var(--day-span)) - 1px),
          var(--line) calc(100% / (var(--hours) * var(--day-span)) - 1px),
          var(--line) calc(100% / (var(--hours) * var(--day-span)))
        );
    }

    .corner {
      grid-row: 1;
      grid-column: 1;
      position: sticky;
      left: 0;
      top: 0;
      z-index: 12;
      height: auto;
      min-height: var(--header-h);
      display: flex;
      align-items: center;
      padding: 0 10px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      background: var(--card);
      border-right: 1px solid var(--line-strong);
      border-bottom: 1px solid var(--line);
      box-shadow: 4px 0 8px rgba(16, 24, 40, 0.04);
    }

    .timeline {
      grid-row: 1;
      grid-column: 2;
      position: sticky;
      top: 0;
      z-index: 11;
      background: #fafbff;
      border-bottom: 1px solid var(--line-strong);
      box-shadow: 0 4px 10px rgba(16, 24, 40, 0.05);
    }

    .timeline-day-mode {
      display: flex;
      flex-direction: row;
      height: var(--header-h);
    }

    .timeline-week-mode {
      display: flex;
      flex-direction: column;
    }

    .week-day-names {
      display: flex;
      flex-direction: row;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .week-day-names span {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      padding: 8px 6px;
      border-left: 1px solid var(--line-strong);
      color: var(--text);
    }

    .hour-row {
      display: flex;
      flex-direction: row;
      height: var(--header-h);
    }

    .hour-cell {
      width: var(--hour-w);
      min-width: var(--hour-w);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--muted);
      border-left: 1px solid var(--line);
    }

    .hour-cell.hour-tick {
      border-left-color: var(--line-strong);
      color: var(--text);
      font-weight: 600;
    }

    .names-col {
      grid-row: 2;
      grid-column: 1;
      position: sticky;
      left: 0;
      z-index: 10;
      background: var(--card);
      border-right: 1px solid var(--line-strong);
      box-shadow: 4px 0 12px rgba(16, 24, 40, 0.06);
    }

    .teacher-name {
      height: var(--row-h);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 2px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
      box-sizing: border-box;
    }

    .teacher-name-main {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.2;
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .teacher-name-hours {
      font-size: 11px;
      line-height: 1.2;
      font-weight: 500;
      color: var(--muted);
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tracks {
      grid-row: 2;
      grid-column: 2;
      display: flex;
      flex-direction: column;
    }

    .track {
      position: relative;
      z-index: 0;
      height: var(--row-h);
      width: calc(var(--hour-w) * var(--hours) * var(--day-span));
      flex-shrink: 0;
      border-bottom: 1px solid var(--line);
      background-color: #fff;
      background-image: repeating-linear-gradient(
        to right,
        transparent 0,
        transparent calc(var(--hour-w) - 1px),
        var(--line) calc(var(--hour-w) - 1px),
        var(--line) var(--hour-w)
      );
    }

    .board.week .track {
      background-image:
        repeating-linear-gradient(
          to right,
          rgba(58, 103, 255, 0.04) 0,
          rgba(58, 103, 255, 0.04) calc(var(--day-band-w) - 2px),
          transparent calc(var(--day-band-w) - 2px),
          transparent var(--day-band-w)
        ),
        repeating-linear-gradient(
          to right,
          transparent 0,
          transparent calc(var(--hour-w) - 1px),
          var(--line) calc(var(--hour-w) - 1px),
          var(--line) var(--hour-w)
        );
    }

    .track:has(.lesson-card:hover) {
      z-index: 12;
      overflow: visible;
    }

    .lesson-card {
      position: absolute;
      top: 6px;
      bottom: 6px;
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 11px;
      line-height: 1.25;
      overflow: hidden;
      border: 1px solid rgba(58, 103, 255, 0.45);
      background: rgba(58, 103, 255, 0.12);
      color: #1f2e70;
      cursor: default;
      box-shadow: 0 1px 2px rgba(16, 24, 40, 0.06);
    }

    /* Инлайновый width у карточки сильнее класса — без !important ховер не перебивает слот */
    .lesson-card:hover {
      bottom: auto !important;
      right: auto;
      height: auto !important;
      min-height: calc(var(--row-h) - 12px);
      width: max-content !important;
      max-width: min(36rem, calc(100vw - 32px)) !important;
      min-width: calc(var(--slot-pct) * 1%) !important;
      z-index: 2;
      overflow: visible !important;
      box-shadow: 0 6px 20px rgba(16, 24, 40, 0.14);
    }

    .lesson-card:hover .lesson-title,
    .lesson-card:hover .lesson-meta {
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .lesson-card.b2 { border-color: rgba(16, 140, 90, 0.45); background: rgba(16, 140, 90, 0.12); color: #12402d; }
    .lesson-card.b3 { border-color: rgba(180, 90, 200, 0.45); background: rgba(180, 90, 200, 0.1); color: #4a2560; }
    .lesson-card.b4 { border-color: rgba(210, 120, 40, 0.45); background: rgba(210, 120, 40, 0.12); color: #5c3610; }

    .lesson-title {
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lesson-meta {
      font-size: 10px;
      opacity: 0.9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .week-zoom-toolbar {
      display: inline-flex;
      align-items: center;
      flex-wrap: wrap;
    }

    .week-zoom-toolbar[hidden] {
      display: none !important;
      margin-left: 0 !important;
    }

    .week-fit-switch {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
      font-size: 13px;
      color: var(--text);
    }

    .week-fit-switch-text {
      font-weight: 500;
    }

    .week-fit-switch-input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
      margin: 0;
    }

    .week-fit-switch-track {
      position: relative;
      width: 44px;
      height: 26px;
      flex-shrink: 0;
      border-radius: 13px;
      background: #d8dce6;
      transition: background 0.2s ease;
    }

    .week-fit-switch-track::after {
      content: "";
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #fff;
      top: 2px;
      left: 2px;
      transition: transform 0.2s ease;
      box-shadow: 0 1px 3px rgba(16, 24, 40, 0.2);
    }

    .week-fit-switch-input:focus-visible + .week-fit-switch-track {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .week-fit-switch-input:checked + .week-fit-switch-track {
      background: var(--accent);
    }

    .week-fit-switch-input:checked + .week-fit-switch-track::after {
      transform: translateX(18px);
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="toolbar">
      <div class="toolbar-actions">
        <div class="view-switch" role="group" aria-label="Режим отображения">
          <button type="button" id="btnDay" class="active">День</button>
          <button type="button" id="btnWeek">Неделя</button>
        </div>
        <h1 class="date-title" id="dateTitle"></h1>
        <div class="date-nav">
          <button type="button" id="btnPrev" aria-label="Назад">←</button>
          <button type="button" id="btnToday">Сегодня</button>
          <button type="button" id="btnNext" aria-label="Вперёд">→</button>
        </div>
        <div class="week-zoom-toolbar" id="weekZoomBar" hidden>
          <label class="week-fit-switch">
            <span class="week-fit-switch-text">Уместить в экран</span>
            <input type="checkbox" class="week-fit-switch-input" id="weekZoomFitSwitch" />
            <span class="week-fit-switch-track" aria-hidden="true"></span>
          </label>
        </div>
      </div>
    </header>
    <div class="board-wrap" id="boardWrap">
      <div class="board" id="board">
        <div class="corner">Преподаватель</div>
        <div class="timeline" id="timeline"></div>
        <div class="names-col" id="namesCol"></div>
        <div class="tracks" id="tracks"></div>
      </div>
    </div>
  </div>

      { teacher: 4, day: 6, start: "10:00", end: "11:00", title: "Английский", place: "каб. 8" },
      { teacher: 4, day: 6, start: "11:30", end: "12:30", title: "Разговорный клуб", place: "каб. 8" },
      { teacher: 4, day: 6, start: "14:00", end: "15:00", title: "Консультация", place: "каб. 8" }
    ];

    let mode = "day";
    let anchorDate = startOfDay(new Date());

    /** Неделя: «стандарт» — фиксированная ширина часа; «в экран» — подгонка под ширину без меток часов */
    let weekZoomMode = "default";
    const DEFAULT_WEEK_HOUR_W = 56;

    const board = document.getElementById("board");
    const timeline = document.getElementById("timeline");
    const namesCol = document.getElementById("namesCol");
    const tracks = document.getElementById("tracks");

    const btnDay = document.getElementById("btnDay");
    const btnWeek = document.getElementById("btnWeek");
    const btnPrev = document.getElementById("btnPrev");
    const btnNext = document.getElementById("btnNext");
    const btnToday = document.getElementById("btnToday");
    const dateTitle = document.getElementById("dateTitle");
    const weekZoomBar = document.getElementById("weekZoomBar");
    const weekZoomFitSwitch = document.getElementById("weekZoomFitSwitch");

    function startOfDay(d) {
      const x = new Date(d);
      x.setHours(0, 0, 0, 0);
      return x;
    }

    /** Понедельник недели для даты */
    function mondayOfWeek(d) {
      const x = startOfDay(d);
      const dow = x.getDay();
      const diff = dow === 0 ? -6 : 1 - dow;
      x.setDate(x.getDate() + diff);
      return x;
    }

    /** Наш формат дня: пн=0 … вс=6 */
    function isoDayIndex(date) {
      const dow = date.getDay();
      return dow === 0 ? 6 : dow - 1;
    }

    function parseTime(s) {
      const [h, m] = s.split(":").map(Number);
      return h * 60 + m;
    }

    function minutesFromScheduleStart(timeStr) {
      return parseTime(timeStr) - START_HOUR * 60;
    }

    function lessonDurationMinutes(L) {
      return parseTime(L.end) - parseTime(L.start);
    }

    function totalMinutesForLessons(list) {
      return list.reduce((sum, L) => sum + lessonDurationMinutes(L), 0);
    }

    /** Краткая подпись длительности на русском */
    function formatHoursSubtitle(totalMinutes) {
      if (totalMinutes <= 0) {
        return "0 ч";
      }
      const h = Math.floor(totalMinutes / 60);
      const m = totalMinutes % 60;
      if (m === 0) {
        return `${h} ч`;
      }
      if (h === 0) {
        return `${m} мин`;
      }
      return `${h} ч ${m} мин`;
    }

    function buildTeacherNameEl(displayName, hoursLabel) {
      const wrap = document.createElement("div");
      wrap.className = "teacher-name";
      const main = document.createElement("span");
      main.className = "teacher-name-main";
      main.textContent = displayName;
      const sub = document.createElement("span");
      sub.className = "teacher-name-hours";
      sub.textContent = hoursLabel;
      wrap.appendChild(main);
      wrap.appendChild(sub);
      return wrap;
    }

    function updateWeekZoomUi() {
      const show = mode === "week";
      weekZoomBar.hidden = !show;
      const fit = show && weekZoomMode === "fit";
      weekZoomFitSwitch.checked = fit;
    }

    function render() {
      board.classList.toggle("week", mode === "week");
      board.classList.toggle("day", mode === "day");
      board.classList.toggle("week-zoom-fit", mode === "week" && weekZoomMode === "fit");
      btnDay.classList.toggle("active", mode === "day");
      btnWeek.classList.toggle("active", mode === "week");
      updateWeekZoomUi();

      const weekStart = mondayOfWeek(anchorDate);

      if (mode === "day") {
        board.style.setProperty("--hours", String(HOURS));
        board.style.setProperty("--day-span", "1");
        board.style.removeProperty("--day-band-w");
        board.style.removeProperty("--hour-w");
        const d = startOfDay(anchorDate);
        const title = `${WEEK_DAYS_SHORT[isoDayIndex(d)]}, ${d.getDate()} ${MONTH_NAMES[d.getMonth()]} ${d.getFullYear()}`;
        dateTitle.textContent = title;

        timeline.innerHTML = "";
        const row = document.createElement("div");
        row.className = "timeline-day-mode";
        for (let h = START_HOUR; h < END_HOUR; h += 1) {
          const cell = document.createElement("div");
          cell.className = "hour-cell hour-tick";
          cell.textContent = `${String(h).padStart(2, "0")}:00`;
          row.appendChild(cell);
        }
        timeline.appendChild(row);

        namesCol.innerHTML = "";
        tracks.innerHTML = "";
        const dayIdx = isoDayIndex(d);

        teachers.forEach((name, ti) => {
          const dayLessons = lessons.filter((L) => L.teacher === ti && L.day === dayIdx);
          const dayMin = totalMinutesForLessons(dayLessons);
          const hoursLabel = `За день: ${formatHoursSubtitle(dayMin)}`;
          namesCol.appendChild(buildTeacherNameEl(name, hoursLabel));

          const track = document.createElement("div");
          track.className = "track";
          dayLessons.forEach((L, li) => {
            const el = document.createElement("div");
            el.className = `lesson-card b${(ti % 4) + 1}`;
            const startM = minutesFromScheduleStart(L.start);
            const endM = minutesFromScheduleStart(L.end);
            const leftPct = (startM / MINUTES_PER_DAY) * 100;
            const widthPct = ((endM - startM) / MINUTES_PER_DAY) * 100;
            el.style.left = `${leftPct}%`;
            el.style.width = `${widthPct}%`;
            el.style.setProperty("--slot-pct", String(widthPct));
            el.innerHTML = `<div class="lesson-title">${escapeHtml(L.title)}</div><div class="lesson-meta">${escapeHtml(L.start)}–${escapeHtml(L.end)} · ${escapeHtml(L.place)}</div>`;
            track.appendChild(el);
          });
          tracks.appendChild(track);
        });
        return;
      }

      /* Неделя */
      board.style.setProperty("--hours", String(HOURS));
      board.style.setProperty("--day-span", "7");
      let dayBandW = "";
      if (weekZoomMode === "default") {
        board.style.setProperty("--hour-w", `${DEFAULT_WEEK_HOUR_W}px`);
        dayBandW = `calc(var(--hour-w) * ${HOURS})`;
        board.style.setProperty("--day-band-w", dayBandW);
      } else {
        board.style.removeProperty("--hour-w");
        board.style.removeProperty("--day-band-w");
      }

      const mon = weekStart;
      const sun = new Date(mon.getTime() + 6 * 86400000);
      const weekRange =
        mon.getMonth() === sun.getMonth()
          ? `${mon.getDate()}–${sun.getDate()} ${MONTH_NAMES[mon.getMonth()]} ${mon.getFullYear()}`
          : `${mon.getDate()} ${MONTH_NAMES[mon.getMonth()]} — ${sun.getDate()} ${MONTH_NAMES[sun.getMonth()]} ${sun.getFullYear()}`;
      dateTitle.textContent = weekRange;

      timeline.innerHTML = "";
      const weekRoot = document.createElement("div");
      weekRoot.className = "timeline-week-mode";

      const namesRow = document.createElement("div");
      namesRow.className = "week-day-names";
      for (let i = 0; i < 7; i += 1) {
        const dayDate = new Date(weekStart);
        dayDate.setDate(weekStart.getDate() + i);
        const span = document.createElement("span");
        if (weekZoomMode === "default") {
          span.style.width = dayBandW;
          span.style.minWidth = dayBandW;
        }
        span.textContent = `${WEEK_DAYS_SHORT[i]} · ${dayDate.getDate()}.${String(dayDate.getMonth() + 1).padStart(2, "0")}`;
        namesRow.appendChild(span);
      }
      weekRoot.appendChild(namesRow);

      if (weekZoomMode === "default") {
        const hourRow = document.createElement("div");
        hourRow.className = "hour-row";
        for (let d = 0; d < 7; d += 1) {
          for (let h = START_HOUR; h < END_HOUR; h += 1) {
            const cell = document.createElement("div");
            cell.className = "hour-cell hour-tick";
            cell.textContent = `${String(h).padStart(2, "0")}:00`;
            hourRow.appendChild(cell);
          }
        }
        weekRoot.appendChild(hourRow);
      }
      timeline.appendChild(weekRoot);

      namesCol.innerHTML = "";
      tracks.innerHTML = "";

      const totalMin = 7 * MINUTES_PER_DAY;

      teachers.forEach((name, ti) => {
        const list = lessons.filter((L) => L.teacher === ti);
        const weekMin = totalMinutesForLessons(list);
        const hoursLabel = `За неделю: ${formatHoursSubtitle(weekMin)}`;
        namesCol.appendChild(buildTeacherNameEl(name, hoursLabel));

        const track = document.createElement("div");
        track.className = "track";
        list.forEach((L) => {
          const el = document.createElement("div");
          el.className = `lesson-card b${(ti % 4) + 1}`;
          const startM = L.day * MINUTES_PER_DAY + minutesFromScheduleStart(L.start);
          const endM = L.day * MINUTES_PER_DAY + minutesFromScheduleStart(L.end);
          const leftPct = (startM / totalMin) * 100;
          const widthPct = ((endM - startM) / totalMin) * 100;
          el.style.left = `${leftPct}%`;
          el.style.width = `${widthPct}%`;
          el.style.setProperty("--slot-pct", String(widthPct));
          el.innerHTML = `<div class="lesson-title">${escapeHtml(L.title)}</div><div class="lesson-meta">${escapeHtml(WEEK_DAYS_SHORT[L.day])} ${escapeHtml(L.start)}–${escapeHtml(L.end)} · ${escapeHtml(L.place)}</div>`;
          track.appendChild(el);
        });
        tracks.appendChild(track);
      });
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    btnDay.addEventListener("click", () => {
      mode = "day";
      render();
    });

    btnWeek.addEventListener("click", () => {
      mode = "week";
      render();
    });

    weekZoomFitSwitch.addEventListener("change", () => {
      weekZoomMode = weekZoomFitSwitch.checked ? "fit" : "default";
      render();
    });

    btnToday.addEventListener("click", () => {
      anchorDate = new Date();
      render();
    });

    btnPrev.addEventListener("click", () => {
      const d = new Date(anchorDate);
      if (mode === "day") {
        d.setDate(d.getDate() - 1);
      } else {
        d.setDate(d.getDate() - 7);
      }
      anchorDate = d;
      render();
    });

    btnNext.addEventListener("click", () => {
      const d = new Date(anchorDate);
      if (mode === "day") {
        d.setDate(d.getDate() + 1);
      } else {
        d.setDate(d.getDate() + 7);
      }
      anchorDate = d;
      render();
    });

    render();
  </script>
</body>
</html>
